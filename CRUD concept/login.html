<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — Wander</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --sand: #f5f0e8;
      --ink: #1a1814;
      --muted: #8a8478;
      --accent: #c8a96e;
      --light: #faf8f4;
      --danger: #c0392b;
      --success: #27ae60;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--light);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 90% 20%, rgba(200,169,110,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 10% 80%, rgba(200,169,110,0.05) 0%, transparent 60%);
      pointer-events: none;
    }

    .page-wrap {
      display: flex;
      width: 100%;
      min-height: 100vh;
    }

    /* Right decorative panel (flipped from signup) */
    .right-deco {
      flex: 1;
      background: var(--ink);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 48px;
      position: relative;
      overflow: hidden;
      order: 2;
    }
    .right-deco::after {
      content: '';
      position: absolute;
      inset: 0;
      background: url('https://images.unsplash.com/photo-1528360983277-13d401cdc186?w=800&q=70') center/cover no-repeat;
      opacity: 0.25;
    }
    .deco-content { position: relative; z-index: 1; }
    .brand-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 300;
      letter-spacing: 0.08em;
      color: var(--light);
      text-decoration: none;
    }
    .brand-logo span { color: var(--accent); }
    .deco-quote {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.2rem;
      font-weight: 300;
      font-style: italic;
      color: var(--light);
      line-height: 1.4;
      opacity: 0.9;
    }
    .deco-quote em { color: var(--accent); font-style: normal; }
    .deco-sub {
      font-size: 0.8rem;
      font-weight: 300;
      letter-spacing: 0.08em;
      color: rgba(250,248,244,0.5);
      margin-top: 12px;
    }

    /* Left form panel */
    .left-form {
      width: 480px;
      flex-shrink: 0;
      padding: 60px 52px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      background: var(--light);
      order: 1;
    }

    .form-tag {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .form-tag::before { content: ''; width: 20px; height: 1px; background: var(--accent); }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.6rem;
      font-weight: 300;
      line-height: 1.1;
      margin-bottom: 8px;
    }
    .form-desc {
      font-size: 0.85rem;
      font-weight: 300;
      color: var(--muted);
      margin-bottom: 36px;
      line-height: 1.6;
    }

    .field { margin-bottom: 20px; }
    label {
      display: block;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }
    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 14px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 300;
      color: var(--ink);
      background: white;
      border: 1px solid rgba(26,24,20,0.15);
      border-radius: 2px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: var(--accent); }

    .forgot-row {
      display: flex;
      justify-content: flex-end;
      margin-top: -12px;
      margin-bottom: 20px;
    }
    .forgot-link {
      font-size: 0.75rem;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .forgot-link:hover { color: var(--ink); }

    .btn-submit {
      width: 100%;
      padding: 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--light);
      background: var(--ink);
      border: none;
      border-radius: 2px;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.3s;
    }
    .btn-submit:hover:not(:disabled) { background: var(--accent); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .alert {
      padding: 12px 16px;
      border-radius: 2px;
      font-size: 0.82rem;
      font-weight: 300;
      margin-bottom: 20px;
      display: none;
      line-height: 1.5;
    }
    .alert.show { display: block; }
    .alert-error { background: rgba(192,57,43,0.08); border: 1px solid rgba(192,57,43,0.2); color: var(--danger); }
    .alert-success { background: rgba(39,174,96,0.08); border: 1px solid rgba(39,174,96,0.2); color: var(--success); }

    .switch-link {
      text-align: center;
      margin-top: 24px;
      font-size: 0.82rem;
      font-weight: 300;
      color: var(--muted);
    }
    .switch-link a {
      color: var(--ink);
      font-weight: 500;
      text-decoration: none;
      border-bottom: 1px solid var(--accent);
    }

    @media (max-width: 900px) {
      .right-deco { display: none; }
      .left-form { width: 100%; padding: 48px 28px; }
    }

    .left-form > * {
      opacity: 0;
      transform: translateY(16px);
      animation: fadeUp 0.6s ease forwards;
    }
    .left-form > *:nth-child(1) { animation-delay: 0.05s; }
    .left-form > *:nth-child(2) { animation-delay: 0.12s; }
    .left-form > *:nth-child(3) { animation-delay: 0.18s; }
    .left-form > *:nth-child(4) { animation-delay: 0.24s; }
    .left-form > *:nth-child(5) { animation-delay: 0.30s; }
    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
<div class="page-wrap">

  <!-- Left form -->
  <div class="left-form">
    <div class="form-tag">Welcome back</div>
    <h1>Sign in to<br>Wander</h1>
    <p class="form-desc">Continue your journey. Your saved trips are waiting.</p>

    <div class="alert alert-error"   id="alert-error"></div>
    <div class="alert alert-success" id="alert-success"></div>

    <form id="login-form" novalidate>
      <div class="field">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="sara@email.com" required/>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Your password" required/>
      </div>

      <div class="forgot-row">
        <a href="#" class="forgot-link" id="forgot-link">Forgot password?</a>
      </div>

      <button type="submit" class="btn-submit" id="submit-btn">Sign in</button>
    </form>

    <div class="switch-link">
      Don't have an account? <a href="signup.html">Create one free</a>
    </div>
  </div>

  <!-- Right decorative panel -->
  <div class="right-deco">
    <div class="deco-content">
      <a href="index.html" class="brand-logo">Wan<span>d</span>er</a>
    </div>
    <div class="deco-content">
      <div class="deco-quote">Every road<br>leads to a<br><em>story.</em></div>
      <div class="deco-sub">48 countries. 320 curated itineraries.</div>
    </div>
  </div>

</div>

<script type="module">
  import { auth } from './firebase-config.js';
  import {
    signInWithEmailAndPassword,
    sendPasswordResetEmail
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const form       = document.getElementById('login-form');
  const submitBtn  = document.getElementById('submit-btn');
  const alertError = document.getElementById('alert-error');
  const alertOk    = document.getElementById('alert-success');

  function showError(msg) {
    alertError.textContent = msg;
    alertError.classList.add('show');
    alertOk.classList.remove('show');
  }
  function showSuccess(msg) {
    alertOk.textContent = msg;
    alertOk.classList.add('show');
    alertError.classList.remove('show');
  }
  function setLoading(on) {
    submitBtn.disabled = on;
    submitBtn.innerHTML = on
      ? '<span class="spinner"></span> Signing in…'
      : 'Sign in';
  }

  // Login
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!email)    return showError('Please enter your email.');
    if (!password) return showError('Please enter your password.');

    setLoading(true);

    try {
      await signInWithEmailAndPassword(auth, email, password);
      showSuccess('Login successful! Redirecting to your profile…');
      setTimeout(() => { window.location.href = 'profile.html'; }, 1200);
    } catch (err) {
      const msgs = {
        'auth/user-not-found':     'No account found with this email. Sign up first.',
        'auth/wrong-password':     'Incorrect password. Please try again.',
        'auth/invalid-email':      'Please enter a valid email address.',
        'auth/too-many-requests':  'Too many failed attempts. Try again later.',
        'auth/invalid-credential': 'Email or password is incorrect.',
        'auth/network-request-failed': 'Network error. Check your connection.',
      };
      showError(msgs[err.code] || `Error: ${err.message}`);
      setLoading(false);
    }
  });

  // Forgot password
  document.getElementById('forgot-link').addEventListener('click', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    if (!email) return showError('Enter your email address first, then click Forgot password.');
    try {
      await sendPasswordResetEmail(auth, email);
      showSuccess(`Password reset email sent to ${email}. Check your inbox.`);
    } catch (err) {
      showError('Could not send reset email. Check the email address.');
    }
  });
</script>
</body>
</html>
